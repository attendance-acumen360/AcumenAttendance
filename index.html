<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f1117; --paper: #f5f3ee; --accent: #d4400a;
    --mid: #6b6660; --card: #ffffff; --border: #e2ddd8;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%; max-width: 420px;
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }
  .card-header {
    background: var(--ink);
    padding: 28px 28px 28px;
    position: relative;
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 60px; height: 3px;
    background: var(--accent);
  }
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.45); margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    color: #fff; line-height: 1.2;
  }
  .card-body { padding: 28px; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 8px;
  }
  /*
    ISSUE 6 FIX:
    - autocomplete="one-time-code" replaces autocomplete="off".
      "off" is ignored by Chrome and Safari for type="tel" since ~2022.
      "one-time-code" signals a transient value to browsers and reliably
      suppresses autofill pre-population across Chrome, Safari, and Firefox.
    - The onfocus handler in JS additionally clears any value that was
      auto-populated before the user interacts, as a belt-and-suspenders
      defence against browsers that ignore autocomplete hints entirely.
    - font-size >= 16px prevents iOS Safari auto-zoom on focus.
    - inputmode="numeric" gives Android users a numeric keypad.
  */
  input[type="tel"] {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; color: var(--ink);
    background: #fff;
    letter-spacing: 0.05em;
    transition: border-color 0.15s;
  }
  input[type="tel"]:focus { outline: none; border-color: var(--accent); }
  .btn {
    width: 100%; padding: 15px;
    background: var(--ink); color: #fff;
    border: none; border-radius: 3px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s; margin-top: 8px;
  }
  .btn:hover { background: #1e2330; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg {
    background: #fff0ee; border: 1px solid #ffc9bf;
    border-radius: 3px; padding: 12px 16px;
    font-size: 13px; color: var(--accent);
    margin-top: 12px; display: none; line-height: 1.5;
  }
  .error-msg.visible { display: block; }
  .state-loading { display: none; }
  .state-loading.active { display: block; }
  .state-success { display: none; text-align: center; padding: 40px 28px 32px; }
  .state-success.active { display: block; }
  .state-duplicate { display: none; text-align: center; padding: 40px 28px 32px; }
  .state-duplicate.active { display: block; }
  .checkmark {
    width: 56px; height: 56px; background: var(--ink);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center; margin: 0 auto 20px;
  }
  .checkmark svg { width: 26px; height: 26px; }
  .warn-icon {
    width: 56px; height: 56px; background: #b45309;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 24px;
  }
  .success-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    color: var(--ink); margin-bottom: 8px;
  }
  .success-sub { font-size: 14px; color: var(--mid); line-height: 1.6; }
  .success-name { font-weight: 600; color: var(--accent); }
  /* Reset link shown after success/duplicate so the page is reusable */
  .reset-link {
    display: inline-block;
    margin-top: 20px;
    font-size: 12px;
    color: var(--mid);
    text-decoration: underline;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .reset-link:hover { color: var(--ink); }
  .dot-loader {
    display: flex; justify-content: center;
    gap: 6px; padding: 24px 0;
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--ink); border-radius: 50%;
    animation: bounce 0.9s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
    40% { transform: translateY(-8px); opacity: 1; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="brand">Acumen GATE Academy</div>
    <div class="card-title">Mark Your<br>Attendance</div>
  </div>

  <div class="card-body" id="formState">
    <div class="field">
      <label>Your Phone Number</label>
      <!--
        ISSUE 6 FIX:
        - autocomplete="one-time-code": reliably suppresses browser autofill
          pre-population on Chrome and Safari for tel fields (autocomplete="off"
          has been ignored by these browsers for type="tel" since ~2022).
        - onfocus handler in JS clears any auto-populated value as a
          belt-and-suspenders defence for browsers that ignore the hint.
        - inputmode="numeric": numeric keypad on Android.
        - font-size 18px: prevents iOS Safari auto-zoom on focus.
      -->
      <input type="tel" id="phoneInput" placeholder="Enter phone number"
        maxlength="15" inputmode="numeric" autocomplete="one-time-code"
        oninput="onInput()" onkeydown="onKey(event)" onfocus="onFocus()" />
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn" id="submitBtn" disabled onclick="submitForm()">Mark Attendance</button>
  </div>

  <div class="state-loading" id="loadingState">
    <div class="dot-loader">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="state-success" id="successState">
    <div class="checkmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">Attendance Marked</div>
    <div class="success-sub">
      <span class="success-name" id="successName"></span><br>
      your attendance has been recorded.
    </div>
    <!-- Reset link so another student can mark attendance on the same device -->
    <span class="reset-link" onclick="resetForm()">Mark for another student</span>
  </div>

  <div class="state-duplicate" id="duplicateState">
    <div class="warn-icon">⚠</div>
    <div class="success-title">Already Marked</div>
    <div class="success-sub">
      <span class="success-name" id="dupName"></span><br>
      your attendance was already recorded for today.
    </div>
    <!-- Reset link so another student can mark attendance on the same device -->
    <span class="reset-link" onclick="resetForm()">Mark for another student</span>
  </div>
</div>

<script>
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJFsZHidHzFcDu4aJeaRzBgWyHO8AQ-teo4v-AXPV_aFqzjQTo7WnAuyw1S0kV-fol/exec";

  var isSubmitting = false;

  // ISSUE 6 FIX: Clear any browser-autofilled value on focus so a
  // previous student's number cannot be silently pre-populated.
  // We only clear if the field was not touched by the user (i.e. the
  // value was set programmatically by the browser, not typed).
  var _userHasTyped = false;
  function onFocus() {
    if (!_userHasTyped && document.getElementById('phoneInput').value.length > 0) {
      document.getElementById('phoneInput').value = '';
      document.getElementById('submitBtn').disabled = true;
    }
  }

  function onInput() {
    _userHasTyped = true;
    var val = document.getElementById('phoneInput').value.trim();
    document.getElementById('submitBtn').disabled = val.length < 10;
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function onKey(e) { if (e.key === 'Enter') submitForm(); }

  /*
   * ISSUE 7 FIX: jsonp() now returns a cleanup function.  Both the
   * timeout handler and the normal callback path call cleanup() to:
   *   1. Remove the injected <script> tag from the DOM.
   *   2. Delete the window[id] callback property.
   * This prevents a late-arriving Apps Script response (after timeout)
   * from calling a stale callback on a form that has already been reset,
   * and eliminates the memory leak on every timeout.
   */
  function jsonp(url, cb) {
    var id = 'jsonp_' + Date.now();

    function cleanup() {
      var s = document.getElementById(id);
      if (s) {
        try { document.body.removeChild(s); } catch(err) {}
      }
      // Delete the global callback so a late response is a no-op.
      try { delete window[id]; } catch(err) { window[id] = undefined; }
    }

    window[id] = function(data) {
      cleanup();
      cb(data);
    };

    var s = document.createElement('script');
    s.id = id;
    s.src = url + '&callback=' + id;
    s.onerror = function() {
      cleanup();
      cb(null);
    };
    document.body.appendChild(s);

    // Return cleanup so callers (e.g. the timeout handler) can call it.
    return cleanup;
  }

  function submitForm() {
    if (isSubmitting) return;
    var phone = document.getElementById('phoneInput').value.trim();
    if (phone.length < 10) return;

    isSubmitting = true;
    document.getElementById('formState').style.display = 'none';
    document.getElementById('loadingState').classList.add('active');

    var timedOut = false;
    var cleanupJsonp = null;  // ISSUE 7 FIX: hold reference to cleanup fn

    var timeout = setTimeout(function() {
      timedOut = true;
      isSubmitting = false;

      // ISSUE 7 FIX: Remove the <script> tag and delete window[id] so
      // a late Apps Script response cannot fire on a reset form.
      if (cleanupJsonp) cleanupJsonp();

      document.getElementById('loadingState').classList.remove('active');
      showForm("Request timed out. Please check your connection and try again.");
    }, 20000);

    // ISSUE 7 FIX: capture the returned cleanup function.
    cleanupJsonp = jsonp(
      APPS_SCRIPT_URL + '?action=submitAttendance&phone=' + encodeURIComponent(phone),
      function(data) {
        if (timedOut) return;  // timeout already fired — UI already reset
        clearTimeout(timeout);
        isSubmitting = false;
        document.getElementById('loadingState').classList.remove('active');
        if (!data) { showForm("Something went wrong. Please try again."); return; }
        if (!data.success) { showForm(data.error || "Something went wrong."); return; }
        if (data.duplicate) {
          document.getElementById('dupName').textContent = data.studentName;
          document.getElementById('duplicateState').classList.add('active');
        } else {
          document.getElementById('successName').textContent = data.studentName;
          document.getElementById('successState').classList.add('active');
        }
      }
    );
  }

  function showForm(msg) {
    document.getElementById('formState').style.display = 'block';
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  // Resets the entire UI back to the blank input state so another
  // student can mark their attendance on the same device/browser tab.
  function resetForm() {
    document.getElementById('successState').classList.remove('active');
    document.getElementById('duplicateState').classList.remove('active');
    document.getElementById('loadingState').classList.remove('active');
    document.getElementById('errorMsg').classList.remove('visible');
    var input = document.getElementById('phoneInput');
    input.value = '';
    _userHasTyped = false;  // ISSUE 6 FIX: reset typed flag for next student
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('formState').style.display = 'block';
    input.focus();
  }
</script>
</body>
</html>
